<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Battle - 贪吃蛇对战</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Lobby -->
<div id="lobby">
  <div class="lobby-box">
    <h1>🐍 Snake Battle</h1>
    <p class="subtitle">多人贪吃蛇对战</p>
    <input type="text" id="name-input" placeholder="输入名字..." maxlength="12" autofocus>
    <div class="skin-section">
      <label>🎨 皮肤</label>
      <div class="color-row" id="color-picker"></div>
      <div class="pattern-row" id="pattern-picker"></div>
    </div>
    <button id="join-btn">加入游戏</button>
    <div id="lobby-players"></div>
    <p class="footnote">Open at <span id="lan-ip">localhost:3000</span> on LAN devices</p>
  </div>
</div>

<!-- Game -->
<div id="game-screen" style="display:none">
  <div id="timer-bar-wrap">
    <div id="timer-fill"></div>
    <span id="timer-text">5:00</span>
  </div>
  <div class="game-container">
    <div class="game-sidebar left-sidebar">
      <div class="panel"><h3>🎮 操作</h3>
        <p>方向键 / WASD 移动</p>
        <p><kbd>空格</kbd> 冲刺 <span class="small">(消耗积分+身长)</span></p>
      </div>
      <div class="panel" id="score-panel"><h3>🏆 排行</h3><ul id="score-list"></ul></div>
    </div>
    <div class="game-main">
      <canvas id="game-canvas"></canvas>
      <div id="sprint-indicator" style="display:none">⚡ 冲刺中</div>
      <div id="death-overlay" style="display:none">
        <div class="death-box"><h2>💀 你死了</h2><p id="death-score">得分: 0</p><p class="small">等待复活中...</p></div>
      </div>
    </div>
    <div class="game-sidebar right-sidebar">
      <div class="panel"><h3>👥 玩家 (<span id="player-count">0</span>)</h3><ul id="player-list"></ul></div>
      <div class="panel"><h3>ℹ️ 信息</h3><p class="small" id="game-info">—</p></div>
    </div>
  </div>
</div>

<!-- Game Over -->
<div id="gameover-overlay" style="display:none">
  <div class="gameover-box">
    <h2>🏆 游戏结束</h2>
    <p id="winner-text"></p>
    <ul id="final-score-list"></ul>
    <p class="small">10秒后自动开始新一局...</p>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
